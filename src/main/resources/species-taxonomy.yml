# Maps substrings in RCON playerlist lines to a display name + diet bucket (for ecosystem embeds).
#
# emoji: — shown next to each species in Discord ecosystem embeds.
#   • Unicode (🦖) is limited: most carnivores share the same few symbols, so rows can look samey.
#   • Server custom emojis: upload in Server settings → Emoji. You can use EITHER:
#       - Short name (same server as the command / dashboard channel):  emoji: ":isle:"
#         The bot resolves :isle: to <:isle:123…> or <a:isle:…> automatically. Name must match the emoji (case-insensitive).
#       - Full form (quoted, e.g. for DMs or if resolution fails):  emoji: "<:isle:123456789012345678>"
#     Easiest full form: type \:EmojiName: in Discord and copy the printed "<:…>" string (quote it in YAML).
#     Prefer uploading these emojis on the SAME server where /evrima ecosystem runs and where the dashboard posts.
# Longer keys are matched first. Short keys use word-boundary matching to reduce false positives.
# Extend or override via ecosystem.taxonomy_path in config.yml (same schema).

entries:
  - display: Allosaurus
    diet: carnivore
    emoji: 🦖
    keys: [ Allosaurus, Allo ]
  - display: Carnotaurus
    diet: carnivore
    emoji: 🦖
    keys: [ Carnotaurus, Carno ]
  - display: Deinosuchus
    diet: carnivore
    emoji: 🐊
