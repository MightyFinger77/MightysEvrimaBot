# Kill / death / join / leave lines for Discord log mirror (EvrimaServerBot 1.0.2+).
# Placeholders (Discord markdown-safe, already escaped by the bot):
#   PvP: {killer} {victim} {killerSpecies} {killerSex} {victimSpecies} {victimGender}
#   AI kill flavor lines omit sex/gender for wildlife (bundled quips use species only).
#   Natural: {victim} {species} {cause} — optional {sex} if you add custom lines (bundled quips omit sex).
#   Join / leave (LogTheIsleJoinData / LogTheIsleLeaveData): {player} {steam} — {steam} is wrapped in backticks.
# Add species keys in lowercase or any case — they are matched case-insensitively.

natural_quips:
  - "**{victim}** ({species}) forgot that food exists. RIP appetite."
  - "**{victim}** ({species}) withered away like a forgotten houseplant."
  - "**{victim}** ({species}) ran out of snacks and paid the ultimate price."
  - "The island said no: **{victim}** ({species}) — {cause}"
  - "**{victim}** ({species}) tried speedrunning starvation. New PB."
  - "Nature is undefeated — **{victim}** ({species}) — {cause}"
  - "**{victim}** ({species}) couldn't find the tutorial on eating."
  - "Press F for **{victim}** ({species}) — hunger wins again."

same_species_quips:
  - "**{killer}** and **{victim}** both rolled {killerSpecies}; **{killer}** won the custody battle."
  - "Mirror match: **{killer}** ({killerSpecies}) showed **{victim}** how it's done."
  - "Same species, different outcomes — **{killer}** ({killerSpecies}) outplayed **{victim}**."
  - "**{killer}**'s {killerSpecies} energy was simply stronger than **{victim}**'s."

generic_pvp_quips:
  - "**{killer}** ({killerSpecies}, {killerSex}) collected **{victim}** ({victimSpecies}) like a side quest."
  - "**{victim}** ({victimSpecies}) picked a fight with **{killer}**'s {killerSex} {killerSpecies}. Bad lobby."
