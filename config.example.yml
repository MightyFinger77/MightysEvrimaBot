# Copy to config.yml next to the JAR (or set working directory).

discord:
  # Prefer environment variable DISCORD_TOKEN for production.
  token: "paste-bot-token-or-use-env"
  # Guild ID for faster slash-command updates (0 = global registration only).
  guild_id: 0
  # Discord ROLE IDs (right-click the role → Copy Role ID), NOT user/account IDs.
  # Anyone who has one of these roles on the server gets that tier (highest wins).
  # head_admin counts as admin for /evrima-admin. Assign the role on Discord; listing it here only configures the bot.
  # Optional: Server Settings → Integrations → this bot → Manage — hide /evrima-mod, /evrima-admin, /evrima-head per role.
  roles:
    moderator: []
    admin: []
    head_admin: []

rcon:
  host: "127.0.0.1"
  port: 5555
  password: "change-me"
  # Milliseconds (raise to 30000–60000 if you see "Read timed out" on slow RCON/dm/playerlist)
  timeout_ms: 30000

database:
  path: "./data/evrima-bot.sqlite"

linking:
  code_ttl_minutes: 20

economy:
  daily_spin_min: 10
  daily_spin_max: 250

# Ecosystem-style population embed (/evrima ecosystem dashboard) — parses RCON playerlist lines.
ecosystem:
  title: "Ecosystem tracker"
  # Short-lived cache so many users don’t hammer RCON (seconds, min 5).
  cache_ttl_seconds: 60
  # Optional: YAML next to config.yml with same schema as bundled species-taxonomy.yml
  taxonomy_path: ""

# Optional: auto-post / edit one dashboard message in a channel (first run sends, then edits).
population_dashboard:
  channel_id: 0
  interval_minutes: 3

# Optional: set one or more text channels’ Discord topics to the same live status line (Minecraft-style bridge).
# Discord rate-limits channel edits (strict shared bucket; Retry-After can be ~180s+) — use interval_minutes >= 5 if you set several channel_ids.
# Multi-channel: one PATCH at a time; multi_channel_stagger_seconds (default 210) waits after each completes before the next channel.
# Use channel_id for a single channel, or channel_ids for several. Bot needs “Manage Channels” on each channel.
# show_bridge_uptime changes every minute and forces more updates; leave false unless you need it.
server_status_topic:
  channel_id: 0
  # Example multiple:  channel_ids: [ 111111111111111111, 222222222222222222 ]
  channel_ids: []
  interval_minutes: 5
  # 0 = show “N players online” without a /max cap
  max_players: 0
  # IANA zone for “Last update” (e.g. America/Chicago). Empty = server/JVM default zone.
  timezone: ""
  show_unique_seen: true
  show_bridge_uptime: false
  # 2+ channel_ids only: seconds after each setTopic finishes before the next (default 210; min 120, max 900).
  multi_channel_stagger_seconds: 210

# Optional: auto-adjust RCON aidensity from how full the server is (vs max_players). Same command as /evrima-admin ai-density.
# Player count comes from RCON playerlist parsing (same estimate as the ecosystem dashboard). Tiers use inclusive
# min_percent / max_percent on 0–100 fill. Omit tiers or use tiers: [] for built-in defaults (0–49 → 1.0, 50–79 → 0.5, 80–100 → 0.15).
adaptive_ai_density:
  enabled: false
  interval_minutes: 3
  max_players: 60
  tiers:
    - { min_percent: 0, max_percent: 49, density: 1.0 }
    - { min_percent: 50, max_percent: 79, density: 0.5 }
    - { min_percent: 80, max_percent: 100, density: 0.15 }

# Optional: RCON wipecorpses on a timer (0 = off). Same command as /evrima-admin wipecorpses.
# Timing is from JVM start (not persisted across restarts). With warn_before_minutes: 5 and
# interval_minutes: 120, the first in-game announce is at ~115 min, wipe at ~120 min, then repeats.
scheduled_wipecorpses:
  interval_minutes: 0
  # In-game announce (RCON announce) this many minutes before each wipe. 0 = no warning.
  # Must be less than interval_minutes or the warning is skipped (logged once at startup).
  warn_before_minutes: 5
  announce_message: "5 minutes until corpse wipe, eat up!"

# Optional: mirror in-game chat from the dedicated server log into Discord.
# RCON cannot read chat; point path at the live TheIsle.log the server writes (same idea as github.com/Theislemanager/Chatbot).
# First start begins at end-of-file (no backlog). Offset is stored in bot_kv in the SQLite DB.
ingame_chat_log:
  channel_id: 0
  # Windows: YAML double-quotes treat \ as escape — do NOT use "C:\foo\bar.log".
  # Use forward slashes: C:/SteamCMD/.../TheIsle.log  OR single quotes: 'C:\SteamCMD\...\TheIsle.log'
  path: ""
  poll_seconds: 2
  # true = also post [Spatial] / [Local] proximity chat; false = global-style channels only (default).
  mirror_local_chat: false
  # Post lines that contain ANY of these substrings (chat, PvP kills, many death reasons).
  # Hunger/starvation: if your build logs it under a different tag, grep TheIsle.log and add it here.
  line_contains:
    - "LogTheIsleChatData"
    - "LogTheIsleKillData"
  # Single-string form still works:  line_contains: "LogTheIsleChatData"
